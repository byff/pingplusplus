name: ping++ CI Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libxlsxwriter-dev libquazip1-qt6-dev qt6-5compat-dev cmake ninja-build

      - name: CMake configure
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Package as deb
        run: |
          mkdir -p debdir/usr/bin debdir/DEBIAN
          cp build/bin/pingplusplus debdir/usr/bin/
          printf 'Package: pingplusplus\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: pingplusplus\nDescription: High-performance batch ping tool\nSection: net\nPriority: optional\nDepends: libc6, libgcc-s1, libstdc++6, libxlsxwriter (>= 1.0.0), libqt6core6t64 (>= 6.5), libqt6guit6t64 (>= 6.5), libqt6network6t64 (>= 6.5), libqt6widgets6t64 (>= 6.5), libquazip1-qt6-1t64 (>= 1.4)\n' > debdir/DEBIAN/control
          dpkg-deb --build debdir pingplusplus-linux-x64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-linux-x64.deb
          path: pingplusplus-linux-x64.deb

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-libxlsxwriter
            mingw-w64-x86_64-quazip-qt6
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc

      - name: CMake configure
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -static -lpthread"

      - name: Build
        shell: msys2 {0}
        run: |
          cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: msys2 {0}
        run: |
          windeployqt build/bin/pingplusplus.exe --no-translations --no-compiler-runtime --no-opengl-sw

      - name: Bundle all native DLLs
        shell: msys2 {0}
        run: |
          deployDir="build/bin"
          mingwBin="/mingw64/bin"

          # windeployqt already ran - now find every DLL the exe actually needs
          echo "=== Scanning exe dependencies with ldd ==="
          ldd build/bin/pingplusplus.exe | grep -E 'not found|=> /mingw64' | while read line; do
            echo "$line"
          done

          echo "=== Copy all missing DLLs ==="
          ldd build/bin/pingplusplus.exe | grep 'not found' | awk '{print $1}' | while read dll; do
            src="$mingwBin/$dll"
            if [ -f "$src" ]; then
              cp "$src" "$deployDir/" && echo "Copied: $dll"
            else
              echo "MISSING (not in mingw64): $dll"
            fi
          done

          echo "=== Also copy DLLs that windeployqt may have missed (font/text libs) ==="
          for dll in libfreetype-6.dll libharfbuzz-0.dll libpng16-16.dll libmd4c.dll libbrotlidec.dll libbz2-1.dll libzstd.dll libiconv-2.dll; do
            if [ -f "$mingwBin/$dll" ]; then
              cp "$mingwBin/$dll" "$deployDir/" && echo "Extra: $dll"
            fi
          done

          echo "=== Final DLL list ==="
          ls -la build/bin/*.dll build/bin/lib*.dll 2>/dev/null | awk '{print $NF}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-windows-x64
          path: build/bin/
