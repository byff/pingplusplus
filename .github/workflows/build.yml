name: ping++ CI Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VCPKG_BINARY_CACHE: /tmp/vcpkg-cache

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-

      - name: Install vcpkg
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install qt6:x64-windows xlsxwriter quazip:x64-windows --clean-after-build

      - name: CMake configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-windows-x64
          path: build/bin/pingplusplus.exe

  linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-base-private-dev \
            libxlsxwriter-dev \
            libquazip5-dev \
            libqt6xml6

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUAZIP_INCLUDE_DIR=/usr/include/quazip6 -DQUAZIP_LIBRARY=/usr/lib/x86_64-linux-gnu/libquazip5.so

      - name: Build
        run: cmake --build build --config Release

      - name: Package as deb
        run: |
          mkdir -p debdir/usr/bin debdir/DEBIAN
          cp build/bin/pingplusplus debdir/usr/bin/
          cat > debdir/DEBIAN/control << 'CONTROL'
Package: pingplusplus
Version: 1.0.0
Architecture: amd64
Maintainer: pingplusplus
Description: High-performance batch ping tool
Section: net
Priority: optional
Depends: libc6, libgcc-s1, libstdc++6, libxlsxwriter (>= 1.0.0), libqt6core6t64 (>= 6.5), libqt6guit6t64 (>= 6.5), libqt6network6t64 (>= 6.5), libqt6widgets6t64 (>= 6.5), libquazip5 (>= 1.0)
CONTROL
          dpkg-deb --build debdir pingplusplus-linux-x64.deb

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-linux-x64.deb
          path: pingplusplus-linux-x64.deb

  linux-arm64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            cmake \
            qt6-base-dev:arm64 \
            qt6-base-private-dev:arm64 \
            libxlsxwriter-dev:arm64 \
            libquazip5-dev:arm64

      - name: CMake configure (cross-compile)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSROOT=/usr/aarch64-linux-gnu \
            -DQUAZIP_INCLUDE_DIR=/usr/include/aarch64-linux-gnu/quazip6 \
            -DQUAZIP_LIBRARY=/usr/lib/aarch64-linux-gnu/libquazip5.so

      - name: Build
        run: cmake --build build --config Release

      - name: Package as deb
        run: |
          mkdir -p debdir-arm64/usr/bin debdir-arm64/DEBIAN
          cp build/bin/pingplusplus debdir-arm64/usr/bin/
          cat > debdir-arm64/DEBIAN/control << 'CONTROL'
Package: pingplusplus
Version: 1.0.0
Architecture: arm64
Maintainer: pingplusplus
Description: High-performance batch ping tool
Section: net
Priority: optional
Depends: libc6, libgcc-s1, libstdc++6, libxlsxwriter (>= 1.0.0), libqt6core6t64 (>= 6.5), libqt6guit6t64 (>= 6.5), libqt6network6t64 (>= 6.5), libqt6widgets6t64 (>= 6.5), libquazip5 (>= 1.0)
CONTROL
          dpkg-deb --build debdir-arm64 pingplusplus-linux-arm64.deb

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-linux-arm64.deb
          path: pingplusplus-linux-arm64.deb
