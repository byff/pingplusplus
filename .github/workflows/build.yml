name: ping++ CI Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install dependencies
        run: C:/vcpkg/vcpkg install qt6:x64-windows xlsxwriter quazip:x64-windows

      - name: CMake configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-windows-x64
          path: build/bin/pingplusplus.exe

  linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qt6-base-dev \
            qt6-base-private-dev \
            libxlsxwriter-dev \
            libquazip5-dev \
            libqt6xml6

      - name: CMake configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_PACKAGE_NO_PACKAGE_REGISTRY=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package as deb
        run: |
          mkdir -p debdir/usr/bin debdir/DEBIAN
          cp build/bin/pingplusplus debdir/usr/bin/
          printf 'Package: pingplusplus\nVersion: 1.0.0\nArchitecture: amd64\nMaintainer: pingplusplus\nDescription: High-performance batch ping tool\nSection: net\nPriority: optional\nDepends: libc6, libgcc-s1, libstdc++6, libxlsxwriter (>= 1.0.0), libqt6core6t64 (>= 6.5), libqt6guit6t64 (>= 6.5), libqt6network6t64 (>= 6.5), libqt6widgets6t64 (>= 6.5), libquazip5 (>= 1.0)\n' > debdir/DEBIAN/control
          dpkg-deb --build debdir pingplusplus-linux-x64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pingplusplus-linux-x64.deb
          path: pingplusplus-linux-x64.deb
